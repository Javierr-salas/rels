<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti ❤️</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: pink;
            font-family: Arial, sans-serif;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 400px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            animation: aparecer 2s;
        }

        .heart {
            font-size: 60px;
            animation: latir 1s infinite;
        }

        button {
            background: #ff4d88;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes latir {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }
    </style>

</head>

<body>

    <div class="card">

        <h1>Para Ti ❤️</h1>

        <p>
            Gracias por hacer mis días más felices.
            Cada momento contigo tiene algo especial y quería que lo supieras.
        </p>

        <div class="heart">❤️</div>

        <br><br>

        <a href="https://www.youtube.com/results?search_query=Rels+B+Caida+del+Cielo"
            target="_blank">

            <button>
                🎵 Toca aquí para escuchar una canción especial
            </button>

        </a>

    </div>

</body>

</html>
